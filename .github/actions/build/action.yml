name: Build Journal site
description: >-
  Builds a site that mounts this engine (default at journal/, overridable via the
  `engine` input). When try_latest is true, fetches the current engine tip and
  attempts that build first; if it fails, falls back to the committed submodule pin
  (last-known-good), generates _data/journal_notice.yml so the site can surface a
  banner, and deploys the LKG build. On success the caller can write the SHA back as
  the new pin.

inputs:
  try_latest:
    description: >-
      Fetch and attempt to build with the current engine tip before falling back
      to the committed submodule pin. Enable only on main-branch builds that can
      write back the result.
    required: false
    default: 'false'
  engine:
    description: >-
      On-disk path the engine submodule is mounted at, relative to the site root.
      Defaults to `.journal-engine` (the engine's own convention: machinery hidden
      under a dotted dir, content at journal/). A site that mounts it elsewhere
      passes its path here so every hardcoded engine reference below resolves.
    required: false
    default: '.journal-engine'

outputs:
  build_sha:
    description: Journal commit SHA used for the build that produced the artifact
    value: ${{ steps.record.outputs.build_sha }}
  build_mode:
    description: "'latest' when the advance succeeded, 'lkg' when the build fell back to the committed pin"
    value: ${{ steps.record.outputs.build_mode }}

runs:
  using: composite
  steps:
    - name: Resolve engine path
      # Export the engine mount path so every later run-step (and bin/*.sh, which
      # honor JOURNAL_ENGINE) resolves it. $GITHUB_ENV is visible to later run
      # steps but NOT to `with:` input expansion, so node-version-file below must
      # use ${{ inputs.engine }} directly.
      run: echo "JOURNAL_ENGINE=${{ inputs.engine }}" >> $GITHUB_ENV
      shell: bash

    - name: Ensure full submodule history
      run: git submodule foreach --recursive 'git fetch --unshallow 2>/dev/null || true'
      shell: bash

    - name: Record last-known-good journal SHA
      run: echo "JOURNAL_LKG_SHA=$(git -C "$JOURNAL_ENGINE" rev-parse HEAD)" >> $GITHUB_ENV
      shell: bash

    - name: Fetch latest journal tip
      if: inputs.try_latest == 'true'
      run: |
        git -C "$JOURNAL_ENGINE" fetch origin main
        echo "JOURNAL_LATEST_SHA=$(git -C "$JOURNAL_ENGINE" rev-parse FETCH_HEAD)" >> $GITHUB_ENV
      shell: bash

    - name: Advance journal to latest
      if: inputs.try_latest == 'true'
      run: git -C "$JOURNAL_ENGINE" checkout "$JOURNAL_LATEST_SHA"
      shell: bash

    - name: Configure bundler
      run: echo "BUNDLE_GEMFILE=$JOURNAL_ENGINE/Gemfile" >> $GITHUB_ENV
      shell: bash

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version-file: ${{ inputs.engine }}/.nvmrc

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - name: Read mount config from _config.yml
      run: |
        ruby -e "
          require 'yaml'
          c = File.exist?('_config.yml') ? (YAML.load_file('_config.yml') || {}) : {}
          puts 'JOURNAL_MOUNT=' + c.fetch('journal', 'journal')
          puts 'JOURNAL_BASE=' + c.fetch('journal', 'journal')
        " >> $GITHUB_ENV
      shell: bash

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Generate git-history data
      run: "$JOURNAL_ENGINE/bin/stats.sh"
      shell: bash

    - name: Build with Jekyll
      id: build-latest
      run: "$JOURNAL_ENGINE/bin/build.sh"
      continue-on-error: ${{ inputs.try_latest == 'true' }}
      shell: bash

    # --- LKG fallback: revert, reinstall, notice, rebuild ---

    - name: Revert journal to last-known-good
      if: inputs.try_latest == 'true' && steps.build-latest.outcome == 'failure'
      run: git -C "$JOURNAL_ENGINE" checkout "$JOURNAL_LKG_SHA"
      shell: bash

    - name: Reinstall gems for last-known-good Gemfile
      if: inputs.try_latest == 'true' && steps.build-latest.outcome == 'failure'
      run: bundle install
      shell: bash

    - name: Write journal_notice data
      if: inputs.try_latest == 'true' && steps.build-latest.outcome == 'failure'
      run: |
        mkdir -p _data
        cat > _data/journal_notice.yml << EOF
        sha: $JOURNAL_LKG_SHA
        url: https://github.com/fccn-antibody/journal.anecdote.channel/tree/$JOURNAL_LKG_SHA
        latest_sha: $JOURNAL_LATEST_SHA
        latest_url: https://github.com/fccn-antibody/journal.anecdote.channel/tree/$JOURNAL_LATEST_SHA
        compare_url: https://github.com/fccn-antibody/journal.anecdote.channel/compare/$JOURNAL_LKG_SHA...$JOURNAL_LATEST_SHA
        EOF
      shell: bash

    - name: Regenerate git-history data with last-known-good
      if: inputs.try_latest == 'true' && steps.build-latest.outcome == 'failure'
      run: "$JOURNAL_ENGINE/bin/stats.sh"
      shell: bash

    - name: Rebuild with last-known-good journal
      if: inputs.try_latest == 'true' && steps.build-latest.outcome == 'failure'
      run: "$JOURNAL_ENGINE/bin/build.sh"
      shell: bash

    # --- record and upload ---

    - name: Record build SHA and mode
      id: record
      run: |
        if [ "${{ inputs.try_latest }}" = "true" ] && [ "${{ steps.build-latest.outcome }}" = "failure" ]; then
          echo "build_sha=$JOURNAL_LKG_SHA" >> $GITHUB_OUTPUT
          echo "build_mode=lkg" >> $GITHUB_OUTPUT
        else
          echo "build_sha=${JOURNAL_LATEST_SHA:-$JOURNAL_LKG_SHA}" >> $GITHUB_OUTPUT
          echo "build_mode=latest" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site
