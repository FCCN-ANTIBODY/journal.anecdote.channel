name: Advance author submodules to HEAD
description: >-
  Advances all author/content submodule pins under the site's content mount (the
  `journal` key in _config.yml, default `journal`) to their current HEAD, commits,
  and pushes to main. The engine submodule lives outside that mount (e.g.
  .journal-engine) and is advanced separately by advance-engine.

runs:
  using: composite
  steps:
    - name: Advance content submodule pins to HEAD
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Content mounts under the `journal` dir (the single content-dir/url-base key,
        # the same one build/action.yml and bin/stats.sh read). Author submodules
        # under it (e.g. journal/<author>) are advanced; the engine (.journal-engine)
        # sits outside it and is rolled by advance-engine instead.
        mount=$(ruby -e "require 'yaml'; c = File.exist?('_config.yml') ? (YAML.load_file('_config.yml') || {}) : {}; print c.fetch('journal', 'journal')")

        git config -f .gitmodules --get-regexp '^submodule\..*\.path$' \
          | awk -v m="$mount" '$2 ~ ("^" m "/")' \
          | awk '{print $2}' \
          | while read -r path; do
              git submodule update --init "$path"
              url=$(git -C "$path" remote get-url origin)
              latest=$(git ls-remote "$url" HEAD | awk '{print $1}')
              git -C "$path" fetch origin
              git -C "$path" checkout "$latest"
              git add "$path"
            done

        git diff --cached --quiet || {
          git commit -m "ci: weekly advance submodules to HEAD [skip ci]"
          git push origin main
        }
      shell: bash
