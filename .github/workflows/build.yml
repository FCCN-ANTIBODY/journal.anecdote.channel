name: Build and deploy Journal site

on:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: journal/Gemfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
      - name: Ensure full submodule history
        run: git submodule foreach --recursive 'git fetch --unshallow 2>/dev/null || true'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: journal/.nvmrc
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Read mount config from _config.yml
        run: |
          ruby -e "
            require 'yaml'
            c = File.exist?('_config.yml') ? (YAML.load_file('_config.yml') || {}) : {}
            puts 'JOURNAL_MOUNT=' + c.fetch('publish', 'publish')
            puts 'JOURNAL_BASE=' + c.fetch('journal', 'journal')
          " >> $GITHUB_ENV
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Generate git-history data
        run: journal/bin/stats.sh
      - name: Build with Jekyll
        run: journal/bin/build.sh
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
