# Jekyll structural options — do not override these in your site config
theme: null
permalink: pretty
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  gfm_quirks: paragraph_end
  template: ""
  math_engine: mathjax
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    default_lang: plaintext
sass:
  style: compressed

# Mount mapping — override per site if you rename the on-disk dir or URL base.
# `publish` is the on-disk directory the site author mounts content into.
# `journal` is the public URL base and the _data/git namespace.
# These are intentionally decoupled: real path != url path.
publish: publish
journal: journal

defaults:
  - scope: {path: ""}
    values:
      preferences: journal
  # NOTE: scope.path matches the ON-DISK source path and cannot interpolate
  # config, so it is the literal mount dir. A site that overrides `publish`
  # must add a matching scope in its own _config.yml (merged config appends it).
  - scope: {path: "publish"}
    values:
      layout: journal

exclude:
  - CNAME
  - .bundle
  - Gemfile
  - Gemfile.lock
  - vendor
  # Non-content siblings at the flattened repo root:
  - journal/         # the engine submodule (trailing slash: dir only, not the `journal` layout)
  - node_modules
  - package.json
  - package-lock.json
  - README.md        # repo-meta README (served pages live at readme.md/license.md)
  - LICENSE.md
  - AGENTS.md
  - .github
  - bin

plugins:
  - jekyll-link-attributes
  - jekyll-redirect-from

# Site-identity placeholders — override all of these in your site's _config.yml
title: Journal
civic_node: ""
civic_abbr: ""
civic_tag: ""
license_badge: ""
license_url: ""
repo_url: ""
repo_name: ""
og_description: ""
preferences:
  dark: false
  year: "2026"
