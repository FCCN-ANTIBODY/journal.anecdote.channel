# Jekyll structural options — do not override these in your site config
theme: null
permalink: pretty
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  gfm_quirks: paragraph_end
  template: ""
  math_engine: mathjax
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    default_lang: plaintext
sass:
  style: compressed

# Content mount / URL base. Content lives on disk under `journal/` and serves at
# `/journal/`: real path == url path, so there is no disk→url remap. The `journal`
# value is the content dir, the public URL base, and the _data/git namespace, all
# one name. (A fork that wants disk != url can reintroduce a separate `publish`
# mount + the permalink hook; the engine no longer ships that indirection.)
journal: journal

defaults:
  - scope: {path: ""}
    values:
      preferences: journal
  # scope.path matches the ON-DISK source path; content mounts at journal/.
  - scope: {path: "journal"}
    values:
      layout: journal

exclude:
  - CNAME
  - .bundle
  - Gemfile
  - Gemfile.lock
  - vendor
  # Non-content siblings at the flattened repo root:
  - .journal-engine/   # the engine submodule's machinery (content lives at journal/)
  - node_modules
  - package.json
  - package-lock.json
  - README.md        # repo-meta README (served pages live at readme.md/license.md)
  - LICENSE.md
  - AGENTS.md
  - .github
  - bin

plugins:
  - jekyll-link-attributes
  - jekyll-redirect-from

# Site-identity placeholders — override all of these in your site's _config.yml
title: Journal
civic_node: ""
civic_abbr: ""
civic_tag: ""
license_badge: ""
license_url: ""
repo_url: ""
repo_name: ""
og_description: ""
preferences:
  dark: false
  year: "2026"
